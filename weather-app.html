<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气查询</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }
    
    .weather-icon {
      font-size: 6rem;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    
    .search-input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
    }
    
    .forecast-card {
      transition: all 0.3s ease;
    }
    
    .forecast-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
    
    .loading-spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      border-left: 4px solid #ef4444;
    }
    
    .history-tag {
      transition: all 0.2s ease;
    }
    
    .history-tag:hover {
      background: #667eea;
      color: white;
    }
    
    .suggestion-item {
      transition: all 0.2s ease;
    }
    
    .suggestion-item:hover {
      background: #f3f4f6;
    }
    
    .metric-icon {
      width: 20px;
      height: 20px;
    }
    
    .retry-btn {
      transition: all 0.2s ease;
    }
    
    .retry-btn:hover {
      transform: scale(1.02);
    }
  </style>
</head>

    function getDayName(dateStr) {
      const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      const date = new Date(dateStr);
      return days[date.getDay()];
    }
    
    function formatDate() {
      const now = new Date();
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      return now.toLocaleDateString('zh-CN', options);
    }
    
    function checkNetworkStatus() {
      if (!navigator.onLine) {
        throw new Error('网络连接不可用，请检查网络设置');
      }
    }
    
    async function fetchWeatherHefeng(city) {
      const locationId = cityLocationIds[city];
      let displayName = city;
      
      if (!locationId) {
        updateLoadingStatus('正在搜索城市...');
        const searchResult = await searchCity(city);
        if (!searchResult) {
          throw new Error(`未找到城市 "${city}"，请尝试其他城市名称`);
        }
        locationId = searchResult.id;
        displayName = searchResult.name;
      }
      
      updateLoadingStatus('正在获取实时天气...');
      const nowWeather = await fetchCurrentWeather(locationId);
      
      updateLoadingStatus('正在获取天气预报...');
      const forecastWeather = await fetchForecastWeather(locationId);
      
      return {
        now: nowWeather,
        forecast: forecastWeather,
        cityDisplayName: displayName
      };
    }
    
    async function searchCity(city) {
      const url = `${WEATHER_API_BASE}/v7/city/search?location=${encodeURIComponent(city)}&key=${WEATHER_API_KEY}`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        
        logApiResponse('城市搜索', url, res, data);
        
        if (!res.ok) {
          throw new Error(`城市搜索失败: HTTP ${res.status}`);
        }
        
        if (data.code !== '200' || !data.location || data.location.length === 0) {
          return null;
        }
        
        return {
          id: data.location[0].id,
          name: data.location[0].name
        };
      } catch (error) {
        logApiError('城市搜索', url, error);
        throw error;
      }
    }
    
    async function fetchCurrentWeather(locationId) {
      const url = `${WEATHER_API_BASE}/v7/weather/now?location=${locationId}&key=${WEATHER_API_KEY}`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        
        logApiResponse('实时天气', url, res, data);
        
        if (!res.ok) {
          throw new Error(`获取实时天气失败: HTTP ${res.status}`);
        }
        
        if (data.code !== '200') {
          throw new Error(`获取实时天气失败: ${data.code}`);
        }
        
        return data.now;
      } catch (error) {
        logApiError('实时天气', url, error);
        throw error;
      }
    }
    
    async function fetchForecastWeather(locationId) {
      const url = `${WEATHER_API_BASE}/v7/weather/7d?location=${locationId}&key=${WEATHER_API_KEY}`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        
        logApiResponse('7天预报', url, res, data);
        
        if (!res.ok) {
          throw new Error(`获取天气预报失败: HTTP ${res.status}`);
        }
        
        if (data.code !== '200') {
          throw new Error(`获取天气预报失败: ${data.code}`);
        }
        
        return data.daily;
      } catch (error) {
        logApiError('7天预报', url, error);
        throw error;
      }
    }
    
    async function fetchWeather(city) {
      showLoading();
      hideError();
      hideWeather();
      
      try {
        checkNetworkStatus();
        updateLoadingStatus('正在连接天气服务器...');
        
        const data = await fetchWeatherHefeng(city);
        
        updateLoadingStatus('正在解析天气数据...');
        displayWeatherFromHefeng(data, city);
        
        addToHistory(city);
        hideLoading();
        showWeather();
        
      } catch (error) {
        console.error('天气查询错误:', error);
        hideLoading();
        
        const errorMessages = {
          'Failed to fetch': '网络请求失败，请检查网络连接',
          'NetworkError': '网络连接失败，请检查网络设置',
          'Not allowed': '地理位置权限被拒绝'
        };
        
        const displayMessage = errorMessages[error.message] || error.message || '未知错误';
        showError(displayMessage, error.message);
      }
    }
    
    function displayWeatherFromHefeng(data, cityNameStr) {
      const current = data.now;
      const forecast = data.forecast;
      
      const displayName = data.cityDisplayName || cityNameStr;
      cityName.textContent = displayName;
      currentDate.textContent = formatDate();
      currentTemp.textContent = current.temp;
      weatherDescription.textContent = current.text;
      
      humidity.textContent = `${current.humidity}%`;
      windSpeed.textContent = `${current.windSpeed} ${current.windDir}`;
      pressure.textContent = `${current.pressure} hPa`;
      visibility.textContent = `${current.visibility || '10'} km`;
      
      const weatherIcon = document.querySelector('.weather-icon');
      weatherIcon.textContent = getWeatherIcon(current.icon);
      
      displayForecastFromHefeng(forecast);
    }
    
    function displayForecastFromHefeng(forecast) {
      forecastContainer.innerHTML = '';
      
      for (let i = 0; i < forecast.length && i < 7; i++) {
        const day = forecast[i];
        const date = day.fxDate;
        const maxTemp = day.tempMax;
        const minTemp = day.tempMin;
        const icon = getWeatherIcon(day.iconDay);
        
        const card = document.createElement('div');
        card.className = 'forecast-card flex-shrink-0 bg-gray-50 rounded-xl p-4 text-center min-w-[80px]';
        card.innerHTML = `
          <p class="text-sm font-medium text-gray-600">${getDayName(date)}</p>
          <div class="text-3xl my-2">${icon}</div>
          <p class="text-sm">
            <span class="font-semibold text-gray-800">${maxTemp}°</span>
            <span class="text-gray-400 ml-1">${minTemp}°</span>
          </p>
        `;
        forecastContainer.appendChild(card);
      }
    }
    
    function updateLoadingStatus(status) {
      loadingStatus.textContent = status;
    }
    
    function showLoading() {
      loadingState.classList.remove('hidden');
      updateLoadingStatus('正在获取天气数据...');
    }
    
    function hideLoading() {
      loadingState.classList.add('hidden');
    }
    
    function showError(message, details) {
      errorMessage.textContent = message;
      if (details && details !== message) {
        errorDetails.textContent = `详细信息: ${details}`;
        errorDetails.classList.remove('hidden');
      } else {
        errorDetails.classList.add('hidden');
      }
      errorState.classList.remove('hidden');
    }
    
    function hideError() {
      errorState.classList.add('hidden');
    }
    
    function showWeather() {
      weatherContent.classList.remove('hidden');
      weatherContent.classList.add('fade-in');
    }
    
    function hideWeather() {
      weatherContent.classList.add('hidden');
    }
    
    function showSuggestions(query) {
      if (!query.trim()) {
        suggestions.classList.add('hidden');
        return;
      }
      
      const filtered = supportedCities.filter(city => 
        city.toLowerCase().includes(query.toLowerCase())
      );
      
      if (filtered.length === 0) {
        suggestions.innerHTML = `
          <div class="suggestion-item px-4 py-3 text-gray-500 flex items-center gap-2">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path>
            </svg>
            尝试搜索任意中国城市...
          </div>
        `;
        suggestions.classList.remove('hidden');
        return;
      }
      
      suggestions.innerHTML = filtered.slice(0, 6).map(city => `
        <div class="suggestion-item px-4 py-3 cursor-pointer hover:bg-gray-100 flex items-center gap-2">
          <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
          ${city}
        </div>
      `).join('');
      
      suggestions.classList.remove('hidden');
      
      document.querySelectorAll('.suggestion-item').forEach(item => {
        item.addEventListener('click', () => {
          searchInput.value = item.textContent.trim();
          suggestions.classList.add('hidden');
          fetchWeather(item.textContent.trim());
        });
      });
    }
    
    function loadHistory() {
      const history = localStorage.getItem('weather_search_history');
      if (history) {
        const cities = JSON.parse(history);
        cities.slice(0, 5).forEach(city => {
          addHistoryTag(city);
        });
      }
    }
    
    function addToHistory(city) {
      let history = localStorage.getItem('weather_search_history');
      history = history ? JSON.parse(history) : [];
      
      const index = history.indexOf(city);
      if (index > -1) {
        history.splice(index, 1);
      }
      
      history.unshift(city);
      history = history.slice(0, 10);
      
      localStorage.setItem('weather_search_history', JSON.stringify(history));
      updateHistoryTags();
    }
    
    function updateHistoryTags() {
      const tags = searchHistory.querySelectorAll('.history-tag');
      tags.forEach(tag => tag.remove());
      loadHistory();
    }
    
    function addHistoryTag(city) {
      const tag = document.createElement('span');
      tag.className = 'history-tag px-3 py-1 bg-gray-100 rounded-full text-sm cursor-pointer text-gray-600';
      tag.textContent = city;
      tag.addEventListener('click', () => {
        searchInput.value = city;
        fetchWeather(city);
      });
      searchHistory.appendChild(tag);
    }
    
    async function getLocationWeather() {
      if (!navigator.geolocation) {
        alert('您的浏览器不支持地理定位功能，请手动输入城市查询天气');
        return;
      }
      
      showLoading();
      updateLoadingStatus('正在请求定位权限...');
      
      navigator.geolocation.getCurrentPosition(
        async (position) => {
          const { latitude, longitude } = position.coords;
          
          try {
            updateLoadingStatus('正在获取位置信息...');
            console.log(`📍 获取到位置: 纬度 ${latitude.toFixed(4)}, 经度 ${longitude.toFixed(4)}`);
            
            const city = await getCityNameByLocation(latitude, longitude);
            if (city) {
              updateLoadingStatus(`正在获取 ${city} 的天气...`);
              searchInput.value = city;
              await fetchWeather(city);
            } else {
              throw new Error('无法根据当前位置获取城市信息');
            }
          } catch (error) {
            console.error('定位天气查询失败:', error);
            hideLoading();
            alert('根据位置获取天气失败，请手动输入城市查询');
            fetchWeather('北京');
          }
        },
        (error) => {
          hideLoading();
          
          const errorMessages = {
            1: '定位权限被拒绝，请在浏览器设置中允许定位权限',
            2: '无法获取位置信息',
            3: '定位请求超时'
          };
          
          const message = errorMessages[error.code] || '定位失败，请手动输入城市查询';
          alert(message);
          fetchWeather('北京');
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }
    
    const presetCities = [
      { name: '北京', lat: 39.9042, lon: 116.4074 },
      { name: '上海', lat: 31.2304, lon: 121.4737 },
      { name: '广州', lat: 23.1291, lon: 113.2644 },
      { name: '深圳', lat: 22.5431, lon: 114.0579 },
      { name: '杭州', lat: 30.2741, lon: 120.1552 },
      { name: '成都', lat: 30.5728, lon: 104.0668 },
      { name: '武汉', lat: 30.5928, lon: 114.3055 },
      { name: '南京', lat: 32.0603, lon: 118.7969 },
      { name: '西安', lat: 34.2619, lon: 108.9463 },
      { name: '重庆', lat: 29.4316, lon: 106.9123 },
      { name: '天津', lat: 39.0842, lon: 117.2008 },
      { name: '苏州', lat: 31.3251, lon: 120.6201 },
      { name: '郑州', lat: 34.7466, lon: 113.6253 },
      { name: '长沙', lat: 28.2280, lon: 112.9388 },
      { name: '青岛', lat: 36.0671, lon: 120.3826 },
      { name: '沈阳', lat: 41.8045, lon: 123.4328 },
      { name: '合肥', lat: 31.8652, lon: 117.2272 },
      { name: '哈尔滨', lat: 45.8038, lon: 126.5349 },
      { name: '福州', lat: 26.0789, lon: 119.2847 },
      { name: '厦门', lat: 24.4798, lon: 118.0894 }
    ];
    
    function findNearestCity(lat, lon) {
      let nearestCity = null;
      let minDistance = Infinity;
      
      for (const city of presetCities) {
        const distance = Math.sqrt(
          Math.pow(lat - city.lat, 2) + Math.pow(lon - city.lon, 2)
        );
        if (distance < minDistance) {
          minDistance = distance;
          nearestCity = city;
        }
      }
      
      return nearestCity ? nearestCity.name : null;
    }
    
    async function getCityNameByLocation(lat, lon) {
      console.log(`🌍 尝试将经纬度转换为城市: ${lat.toFixed(4)}, ${lon.toFixed(4)}`);
      
      const url = `${WEATHER_API_BASE}/v7/city/lookup?location=${lat},${lon}&key=${WEATHER_API_KEY}`;
      
      try {
        const res = await fetch(url);
        
        if (!res.ok) {
          console.warn(`⚠️ API查询失败 (HTTP ${res.status}), 尝试使用预设城市列表匹配`);
          const nearest = findNearestCity(lat, lon);
          console.log(`📍 预设城市匹配结果: ${nearest || '未找到匹配城市'}`);
          return nearest;
        }
        
        const data = await res.json();
        
        if (data.code !== '200' || !data.location || data.location.length === 0) {
          console.warn(`⚠️ API返回数据无效, 尝试使用预设城市列表匹配`);
          const nearest = findNearestCity(lat, lon);
          console.log(`📍 预设城市匹配结果: ${nearest || '未找到匹配城市'}`);
          return nearest;
        }
        
        const cityName = data.location[0].name;
        console.log(`✅ API查询成功: ${cityName}`);
        return cityName;
        
      } catch (error) {
        console.error(`❌ API查询异常: ${error.message}, 尝试使用预设城市列表匹配`);
        const nearest = findNearestCity(lat, lon);
        console.log(`📍 预设城市匹配结果: ${nearest || '未找到匹配城市'}`);
        return nearest;
      }
    }
    
    searchInput.addEventListener('input', (e) => {
      showSuggestions(e.target.value);
    });
    
    locationBtn.addEventListener('click', () => {
      getLocationWeather();
    });
    
    searchBtn.addEventListener('click', () => {
      const city = searchInput.value.trim();
      if (city) {
        suggestions.classList.add('hidden');
        fetchWeather(city);
      }
    });
    
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        const city = searchInput.value.trim();
        if (city) {
          suggestions.classList.add('hidden');
          fetchWeather(city);
        }
      }
    });
    
    retryBtn.addEventListener('click', () => {
      const city = searchInput.value.trim() || '北京';
      fetchWeather(city);
    });
    
    document.addEventListener('click', (e) => {
      if (!suggestions.contains(e.target) && e.target !== searchInput) {
        suggestions.classList.add('hidden');
      }
    });
    
    document.addEventListener('DOMContentLoaded', () => {
      loadHistory();
      fetchWeather('北京');
    });
  </script>
